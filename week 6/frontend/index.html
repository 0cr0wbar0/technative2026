<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="stylesheet.css" />
    <title>API</title>
  </head>
  <body>
    <h1>API</h1>
    <div class="images"></div>
    <!-- <button id="toggle" onclick="toggleCookie()">Toggle Magic Cookie!</button> -->
    <p id="toggle-message"></p>
    <form
      id="upload-form"
      method="post"
      action="http://localhost:3000/upload"
      enctype="multipart/form-data"
    >
      <input type="file" name="uploadImage" id="uploadImage" accept="image/*" />
      <button id="upload-button" type="submit">Upload image</button>
    </form>
    <select name="deleteImage" id="deleteImage"></select>
    <button id="delete-submit" type="submit">Delete image</button>
    <script src="script.js"></script>
  </body>
</html>
